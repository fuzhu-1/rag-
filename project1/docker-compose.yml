version: "3.8"

services:
  # ── Milvus Standalone Vector Database ──
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./data/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./data/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  # ── vLLM Inference Server (requires GPU) ──
  # Uncomment if you have a GPU available
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   runtime: nvidia
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - HF_HOME=/data/huggingface
  #   volumes:
  #     - ./data/models:/data
  #     - ~/.cache/huggingface:/data/huggingface
  #   command: >
  #     --model Qwen/Qwen2.5-7B-Instruct
  #     --host 0.0.0.0
  #     --port 8000
  #     --gpu-memory-utilization 0.9
  #     --max-model-len 32768
  #     --trust-remote-code
  #   ports:
  #     - "8000:8000"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

  # ── FastAPI Backend ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LLM_API_BASE=http://vllm:8000/v1
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080
    depends_on:
      milvus:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit Frontend ──
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - LLM_API_BASE=http://vllm:8000/v1
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - STREAMLIT_SERVER_PORT=8501
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

  # ── Optional: Qdrant as alternative vector DB ──
