<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise-RAG | 企业知识库智能问答系统</title>
<style>
/* ============================================================
   ENTERPRISE-RAG — Competition-Grade Design System
   ============================================================ */
:root {
  --bg-deep: #0a0e17;
  --bg-primary: #111827;
  --bg-secondary: #1a1f2e;
  --bg-card: #151a28;
  --bg-hover: #1e2436;
  --border: #1e2d4a;
  --border-accent: #2d4a7a;
  --text-primary: #e8edf4;
  --text-secondary: #8b949e;
  --text-muted: #5a6578;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.3);
  --accent-2: #8b5cf6;
  --accent-3: #06b6d4;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --gradient-1: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  --gradient-2: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
  --glass: rgba(17,24,39,0.85);
  --glass-border: rgba(59,130,246,0.15);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 30px var(--accent-glow);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-slow: 0.4s cubic-bezier(0.4,0,0.2,1);
  --font-mono: 'JetBrains Mono','Cascadia Code','Fira Code',monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  -webkit-font-smoothing: antialiased;
}

/* ── Animated background ── */
.bg-mesh {
  position: fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(59,130,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(139,92,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(6,182,212,0.03) 0%, transparent 70%);
}
.bg-grid {
  position: fixed; inset:0; z-index:0; pointer-events:none; opacity:0.03;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}
.bg-particles {
  position: fixed; inset:0; z-index:0; pointer-events:none;
}

/* ── Sidebar ── */
.sidebar {
  width: 280px; min-width: 280px; height: 100vh;
  background: var(--bg-primary); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 10;
  transition: transform var(--transition-slow);
}
.sidebar-header {
  padding: 24px 20px; border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
}
.sidebar-logo .icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: var(--gradient-1); display: flex; align-items: center;
  justify-content: center; font-size: 18px; box-shadow: var(--shadow-glow);
}
.sidebar-new-chat {
  margin: 16px 20px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--radius); border: none;
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
  font-family: inherit; letter-spacing: 0.2px;
}
.btn-primary {
  background: var(--gradient-1); color: #fff; width: 100%;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
.btn-ghost {
  background: transparent; color: var(--text-secondary); border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-accent); }
.btn-danger {
  background: transparent; color: var(--danger); border: 1px solid rgba(239,68,68,0.3);
}
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: var(--radius-sm); }
.btn-icon {
  width: 34px; height: 34px; padding: 0; border-radius: var(--radius-sm);
  background: transparent; color: var(--text-secondary); border: 1px solid transparent;
}
.btn-icon:hover { background: var(--bg-hover); border-color: var(--border); color: var(--text-primary); }

.sidebar-nav { padding: 0 12px; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  border-radius: var(--radius-sm); cursor: pointer; color: var(--text-secondary);
  transition: all var(--transition); font-size: 14px; margin-bottom: 2px;
  border: 1px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: rgba(59,130,246,0.1); color: var(--accent);
  border-color: rgba(59,130,246,0.25); font-weight: 500;
}
.nav-item .badge {
  margin-left: auto; background: var(--accent); color: #fff;
  font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
}

.sidebar-history {
  flex:1; overflow-y: auto; padding: 8px 12px;
}
.sidebar-history::-webkit-scrollbar { width: 3px; }
.sidebar-history::-webkit-scrollbar-track { background: transparent; }
.sidebar-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.history-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 13px; color: var(--text-secondary); transition: all var(--transition);
  border: 1px solid transparent; margin-bottom: 2px;
}
.history-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.history-item.active { background: rgba(59,130,246,0.08); color: var(--text-primary); border-color: rgba(59,130,246,0.2); }
.history-item .title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.history-item .del-btn { opacity:0; transition: opacity var(--transition); color: var(--danger); background:none; border:none; cursor:pointer; font-size:14px; padding:2px 6px; border-radius:4px; }
.history-item:hover .del-btn { opacity:1; }
.history-item .del-btn:hover { background: rgba(239,68,68,0.15); }

.sidebar-footer {
  padding: 16px 20px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px rgba(34,197,94,0.5); animation: pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.5} }
.status-text { font-size: 12px; color: var(--text-muted); }
.status-text span { color: var(--success); font-weight: 500; }

/* ── Main ── */
.main {
  flex:1; display:flex; flex-direction:column; height:100vh;
  position:relative; z-index:5; min-width:0;
}

/* ── Top Bar ── */
.topbar {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--glass); backdrop-filter: blur(20px);
}
.topbar-title {
  font-size: 16px; font-weight: 600; letter-spacing: -0.2px;
}
.topbar-actions { display: flex; gap: 8px; }

/* ── Chat Container ── */
.chat-container {
  flex:1; overflow-y: auto; padding: 24px;
  display: none; flex-direction: column;
}
.chat-container.active { display: flex; }
.chat-container::-webkit-scrollbar { width: 4px; }
.chat-container::-webkit-scrollbar-track { background: transparent; }
.chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Welcome screen */
.welcome {
  flex:1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; padding: 40px;
}
.welcome-icon {
  width: 80px; height: 80px; border-radius: var(--radius-lg);
  background: var(--gradient-1); display: flex; align-items: center;
  justify-content: center; font-size: 36px; margin-bottom: 24px;
  box-shadow: 0 0 60px var(--accent-glow); animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.welcome h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
.welcome p { color: var(--text-secondary); font-size: 15px; margin-bottom: 24px; }
.welcome-hints { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.hint-chip {
  padding: 10px 18px; border-radius: 20px; background: var(--bg-card);
  border: 1px solid var(--border); color: var(--text-secondary);
  font-size: 13px; cursor: pointer; transition: all var(--transition);
}
.hint-chip:hover {
  background: var(--bg-hover); color: var(--text-primary);
  border-color: var(--border-accent); transform: translateY(-2px);
}

/* ── Messages ── */
.message {
  display: flex; gap: 14px; margin-bottom: 24px; animation: msg-in 0.3s ease;
}
@keyframes msg-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.message.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 36px; height: 36px; border-radius: var(--radius-sm); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.message.user .msg-avatar { background: var(--gradient-1); }
.message.assistant .msg-avatar { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
.msg-bubble {
  max-width: 75%; padding: 14px 18px; border-radius: var(--radius-lg);
  line-height: 1.65; font-size: 14px; position: relative;
  word-break: break-word;
}
.message.user .msg-bubble {
  background: var(--gradient-1); color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant .msg-bubble {
  background: var(--bg-card); border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-bubble pre {
  background: rgba(0,0,0,0.4); border-radius: var(--radius-sm); padding: 14px;
  overflow-x: auto; margin: 10px 0; font-family: var(--font-mono); font-size: 13px;
  border: 1px solid var(--border);
}
.msg-bubble code { font-family: var(--font-mono); font-size: 0.9em; }
.msg-bubble p { margin: 6px 0; }
.msg-bubble ul, .msg-bubble ol { margin: 8px 0; padding-left: 20px; }
.msg-bubble li { margin: 4px 0; }
.msg-bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
.msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.msg-bubble th { background: rgba(59,130,246,0.1); font-weight: 600; }
.msg-bubble blockquote {
  border-left: 3px solid var(--accent); padding-left: 14px; margin: 10px 0;
  color: var(--text-secondary);
}
.msg-time { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

/* Sources */
.msg-sources {
  margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px;
}
.source-toggle {
  font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; font-family: inherit;
}
.source-toggle:hover { color: var(--accent-2); }
.source-list { margin-top: 8px; display: none; }
.source-list.open { display: block; }
.source-card {
  background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px; margin-bottom: 8px; font-size: 13px;
  transition: all var(--transition);
}
.source-card:hover { border-color: var(--border-accent); }
.source-card .src-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.source-card .src-name { font-weight: 600; color: var(--accent-2); font-size: 12px; }
.source-card .src-score { font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 10px; }
.source-card .src-text { color: var(--text-secondary); line-height: 1.5; font-size: 12px; }

/* ── Input Area ── */
.input-area {
  padding: 16px 24px 24px; border-top: 1px solid var(--border);
  background: var(--glass); backdrop-filter: blur(20px);
  display: none;
}
.input-area.active { display: block; }
.input-wrapper {
  display: flex; gap: 10px; align-items: flex-end;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 8px 8px 8px 18px;
  transition: all var(--transition);
}
.input-wrapper:focus-within {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
}
.input-wrapper textarea {
  flex:1; background: transparent; border: none; outline: none;
  color: var(--text-primary); font-size: 14px; font-family: inherit;
  resize: none; line-height: 1.5; min-height: 24px; max-height: 150px;
  padding: 8px 0;
}
.input-wrapper textarea::placeholder { color: var(--text-muted); }
.btn-send {
  width: 40px; height: 40px; border-radius: var(--radius); border: none;
  background: var(--gradient-1); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); flex-shrink: 0;
}
.btn-send:hover { box-shadow: var(--shadow-glow); transform: scale(1.05); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.typing-indicator {
  display: flex; gap: 4px; padding: 8px 0;
}
.typing-indicator span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }

/* ── Upload Panel ── */
.upload-panel { display: none; flex-direction: column; height: 100%; }
.upload-panel.active { display: flex; }
.upload-zone {
  flex:1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; margin: 24px; border: 2px dashed var(--border);
  border-radius: var(--radius-xl); cursor: pointer; transition: all var(--transition-slow);
  background: var(--bg-card); min-height: 300px;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent); background: rgba(59,130,246,0.05);
  box-shadow: inset 0 0 60px rgba(59,130,246,0.05);
}
.upload-zone .icon { font-size: 56px; margin-bottom: 20px; opacity: 0.6; }
.upload-zone h3 { font-size: 18px; margin-bottom: 6px; }
.upload-zone p { color: var(--text-muted); font-size: 13px; }
.upload-progress {
  margin: 0 24px 24px; display: none;
}
.upload-progress.active { display: block; }
.progress-bar {
  height: 6px; border-radius: 3px; background: var(--bg-hover);
  overflow: hidden; margin-bottom: 8px;
}
.progress-bar .fill {
  height: 100%; background: var(--gradient-1); border-radius: 3px;
  transition: width 0.5s ease; width: 0%;
}
.progress-text { font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; }
.uploaded-files { padding: 0 24px 24px; }
.file-chip {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px;
  animation: msg-in 0.3s ease;
}

/* ── Docs Panel ── */
.docs-panel { display: none; flex-direction: column; height: 100%; }
.docs-panel.active { display: flex; }
.docs-toolbar { padding: 16px 24px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid var(--border); }
.search-input {
  flex:1; padding: 8px 14px; border-radius: var(--radius-sm);
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); font-size: 14px; font-family: inherit;
  outline: none; transition: all var(--transition);
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }
.docs-table-wrap { flex:1; overflow-y: auto; padding: 0 24px 24px; }
.docs-table-wrap::-webkit-scrollbar { width: 4px; }
.docs-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.docs-table { width: 100%; border-collapse: collapse; }
.docs-table th {
  text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
  background: var(--bg-deep);
}
.docs-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
.docs-table tr { transition: background var(--transition); }
.docs-table tbody tr:hover { background: var(--bg-hover); }
.doc-type-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  background: rgba(59,130,246,0.15); color: var(--accent);
}

/* ── Toast ── */
.toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 18px; border-radius: var(--radius); font-size: 13px;
  font-weight: 500; backdrop-filter: blur(12px);
  animation: toast-in 0.3s ease;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-lg);
}
@keyframes toast-in { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.toast.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
.toast.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
.toast.info { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: var(--accent); }

/* ── Responsive ── */
@media (max-width:768px) {
  .sidebar { position:fixed; left:0; top:0; transform:translateX(-100%); z-index:100; }
  .sidebar.open { transform:translateX(0); }
  .msg-bubble { max-width: 90%; }
  .welcome h2 { font-size: 22px; }
}

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset:0; background: rgba(0,0,0,0.7); z-index: 200;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: var(--radius-xl); padding: 28px; max-width: 500px;
  width: 90%; box-shadow: var(--shadow-lg); animation: msg-in 0.3s ease;
}
.modal h3 { margin-bottom: 12px; font-size: 18px; }
.modal p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- Background Effects -->
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<canvas class="bg-particles" id="particles"></canvas>

<!-- Toast Container -->
<div class="toast-container" id="toasts"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="icon">⚡</div>
      <span>Enterprise-RAG</span>
    </div>
  </div>
  <div class="sidebar-new-chat">
    <button class="btn btn-primary" onclick="newConversation()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新建对话
    </button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-page="chat" onclick="switchPage('chat', this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      对话问答
    </div>
    <div class="nav-item" data-page="upload" onclick="switchPage('upload', this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上传文档
      <span class="badge" id="uploaded-count" style="display:none">0</span>
    </div>
    <div class="nav-item" data-page="docs" onclick="switchPage('docs', this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      文档管理
    </div>
  </nav>
  <div class="sidebar-history" id="history-list">
    <!-- populated by JS -->
  </div>
  <div class="sidebar-footer">
    <div class="status-dot"></div>
    <div class="status-text">系统 <span>运行中</span> · v1.0</div>
  </div>
</aside>

<!-- Main Content -->
<main class="main">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">💬 对话问答</div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" onclick="checkHealth()">🔗 检查连接</button>
    </div>
  </div>

  <!-- Chat Page -->
  <div class="chat-container active" id="page-chat">
    <div class="welcome" id="welcome-screen">
      <div class="welcome-icon">🧠</div>
      <h2>Enterprise-RAG 知识库助手</h2>
      <p>基于 RAG 架构的企业级智能问答系统，精准检索 · 可靠回答</p>
      <div class="welcome-hints">
        <div class="hint-chip" onclick="askHint('公司的年假政策是什么？')">🏖️ 公司年假政策</div>
        <div class="hint-chip" onclick="askHint('报销流程需要哪些步骤？')">💰 报销流程步骤</div>
        <div class="hint-chip" onclick="askHint('IT支持的联系方式是什么？')">📞 IT联系方式</div>
        <div class="hint-chip" onclick="askHint('数据安全规范中机密文件如何传输？')">🔒 数据安全规范</div>
      </div>
    </div>
    <div id="messages-container"></div>
  </div>

  <!-- Upload Page -->
  <div class="upload-panel" id="page-upload">
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📤</div>
      <h3>拖拽文件到此处上传</h3>
      <p>支持 PDF · DOCX · XLSX · PPTX · TXT · MD · CSV · 图片</p>
      <p style="margin-top:12px;font-size:12px;color:var(--text-muted)">单文件最大 100MB</p>
    </div>
    <input type="file" id="file-input" multiple hidden
      accept=".pdf,.docx,.doc,.txt,.md,.xlsx,.xls,.csv,.pptx,.png,.jpg,.jpeg"
      onchange="handleFileSelect(event)">
    <div class="upload-progress" id="upload-progress">
      <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
      <div class="progress-text"><span id="progress-status">准备中...</span><span id="progress-pct">0%</span></div>
    </div>
    <div class="uploaded-files" id="uploaded-files"></div>
  </div>

  <!-- Docs Page -->
  <div class="docs-panel" id="page-docs">
    <div class="docs-toolbar">
      <input class="search-input" placeholder="🔍 搜索文档名称..." id="docs-search" oninput="renderDocsTable()">
      <button class="btn btn-ghost btn-sm" onclick="reindexDocs()">🔄 重新索引</button>
    </div>
    <div class="docs-table-wrap">
      <table class="docs-table">
        <thead>
          <tr><th>文档名</th><th>类型</th><th>页数</th><th>文本块</th><th>操作</th></tr>
        </thead>
        <tbody id="docs-tbody"><tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:40px;">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area active" id="input-area">
    <div class="input-wrapper">
      <textarea id="query-input" rows="1" placeholder="输入您的问题，按 Enter 发送..." onkeydown="handleKeyDown(event)"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()" title="发送">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</main>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <h3>确认删除</h3>
    <p id="confirm-msg">确定要删除这个文档吗？此操作不可撤销。</p>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">取消</button>
      <button class="btn btn-danger btn-sm" id="confirm-btn">确认删除</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ENTERPRISE-RAG — Application Logic
// ============================================================

const API_BASE = 'http://localhost:8080';
let currentConvId = crypto.randomUUID();
let conversations = [];
let allDocs = [];

// ── Particles Background ──
(function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5, alpha: Math.random() * 0.4 + 0.1
    });
  }
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(59,130,246,${p.alpha})`;
      ctx.fill();
    });
    // draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(59,130,246,${0.04 * (1 - dist/120)})`;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

// ── Toast System ──
function toast(msg, type='info') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  el.innerHTML = `${icons[type]||''} ${msg}`;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='0.3s ease'; setTimeout(()=>el.remove(),300); }, 3000);
}

// ── Page Switching ──
function switchPage(page, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.chat-container,.upload-panel,.docs-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('input-area').classList.remove('active');

  const titles = { chat:'💬 对话问答', upload:'📤 上传文档', docs:'📋 文档管理' };
  document.getElementById('topbar-title').textContent = titles[page];

  if (page === 'chat') {
    document.getElementById('page-chat').classList.add('active');
    document.getElementById('input-area').classList.add('active');
  } else if (page === 'upload') {
    document.getElementById('page-upload').classList.add('active');
  } else if (page === 'docs') {
    document.getElementById('page-docs').classList.add('active');
    loadDocs();
  }
}

// ── Conversations ──
async function loadConversations() {
  try {
    const r = await fetch(`${API_BASE}/api/conversations`);
    const data = await r.json();
    conversations = data.conversations || [];
    renderHistory();
  } catch(e) { /* backend may not be running */ }
}

async function newConversation() {
  try {
    const r = await fetch(`${API_BASE}/api/conversations?title=新对话`, { method:'POST' });
    const data = await r.json();
    currentConvId = data.id;
    document.getElementById('messages-container').innerHTML = '';
    document.getElementById('welcome-screen').style.display = 'flex';
  } catch(e) {
    currentConvId = crypto.randomUUID();
    document.getElementById('messages-container').innerHTML = '';
    document.getElementById('welcome-screen').style.display = 'flex';
  }
  loadConversations();
}

function renderHistory() {
  const container = document.getElementById('history-list');
  container.innerHTML = conversations.map(c => `
    <div class="history-item ${c.id === currentConvId ? 'active' : ''}" onclick="switchConversation('${c.id}')">
      <span class="title">${escapeHtml(c.title||'新对话')}</span>
      <button class="del-btn" onclick="event.stopPropagation();deleteConversation('${c.id}')">×</button>
    </div>
  `).join('');
}

function switchConversation(id) {
  currentConvId = id;
  document.getElementById('messages-container').innerHTML = '';
  document.getElementById('welcome-screen').style.display = 'flex';
  renderHistory();
}

async function deleteConversation(id) {
  try { await fetch(`${API_BASE}/api/conversations/${id}`, { method:'DELETE' }); } catch(e) {}
  if (currentConvId === id) { currentConvId = crypto.randomUUID(); }
  loadConversations();
}

// ── Chat ──
function hideWelcome() {
  document.getElementById('welcome-screen').style.display = 'none';
}

function askHint(q) {
  document.getElementById('query-input').value = q;
  sendMessage();
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('query-input');
  const query = input.value.trim();
  if (!query) return;

  hideWelcome();
  input.value = ''; input.style.height = 'auto';
  const container = document.getElementById('messages-container');

  // Add user message
  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.innerHTML = `
    <div class="msg-avatar">👤</div>
    <div><div class="msg-bubble">${escapeHtml(query)}</div><div class="msg-time">${now()}</div></div>
  `;
  container.appendChild(userMsg);

  // Add assistant placeholder
  const asstMsg = document.createElement('div');
  asstMsg.className = 'message assistant';
  asstMsg.id = 'msg-' + Date.now();
  asstMsg.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div>
      <div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
    </div>
  `;
  container.appendChild(asstMsg);
  container.scrollTop = container.scrollHeight;

  try {
    // Use streaming endpoint
    const resp = await fetch(`${API_BASE}/api/query/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: query, top_k: 5, use_cot: false, conversation_id: currentConvId })
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let sourcesData = null;

    // After streaming, get sources from non-stream endpoint
    const srcResp = await fetch(`${API_BASE}/api/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: query, top_k: 5, use_cot: false, conversation_id: currentConvId })
    });
    if (srcResp.ok) {
      const srcData = await srcResp.json();
      fullText = srcData.answer || '';
      sourcesData = srcData.contexts || [];
    }

    // Read stream for display
    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const text = decoder.decode(value, { stream: true });
        const lines = text.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ') && line !== 'data: [DONE]' && !line.startsWith('data: [ERROR]')) {
            fullText += line.slice(6);
            updateAsstBubble(asstMsg.id, fullText, sourcesData);
            container.scrollTop = container.scrollHeight;
          }
        }
      }
    } catch(e) { /* stream ended */ }

    updateAsstBubble(asstMsg.id, fullText, sourcesData);

  } catch(e) {
    updateAsstBubble(asstMsg.id, `❌ 请求失败：${e.message}\n\n请确认后端服务已启动（http://localhost:8080）`, null);
    toast('无法连接到后端服务', 'error');
  }
}

function updateAsstBubble(msgId, text, sources) {
  const msg = document.getElementById(msgId);
  if (!msg) return;
  const bubble = msg.querySelector('.msg-bubble');
  bubble.innerHTML = renderMarkdown(text);
  if (sources && sources.length > 0) {
    const sourcesHTML = `
      <div class="msg-sources">
        <button class="source-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.textContent.includes('展开')?'🔽 收起来源':'📎 展开 ${sources.length} 条来源'">
          📎 展开 ${sources.length} 条来源
        </button>
        <div class="source-list">
          ${sources.map((s,i)=>`
            <div class="source-card">
              <div class="src-header">
                <span class="src-name">📄 ${escapeHtml(s.metadata?.source||'未知')} ${s.metadata?.page ? 'P.'+s.metadata.page : ''}</span>
                <span class="src-score">相关度 ${(s.score*100).toFixed(0)}%</span>
              </div>
              <div class="src-text">${escapeHtml((s.text||'').substring(0,400))}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
    const info = document.createElement('div');
    info.innerHTML = `<div class="msg-time">${now()}</div>`;
    bubble.appendChild(info);
    bubble.insertAdjacentHTML('beforeend', sourcesHTML);
  } else {
    const info = document.createElement('div');
    info.innerHTML = `<div class="msg-time">${now()}</div>`;
    bubble.appendChild(info);
  }
}

// ── Simple Markdown Renderer ──
function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Line breaks
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

// ── File Upload ──
const uploadZone = document.getElementById('upload-zone');
['dragenter','dragover','dragleave','drop'].forEach(evt => {
  uploadZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
});
['dragenter','dragover'].forEach(evt => {
  uploadZone.addEventListener(evt, () => uploadZone.classList.add('dragover'));
});
['dragleave','drop'].forEach(evt => {
  uploadZone.addEventListener(evt, () => uploadZone.classList.remove('dragover'));
});
uploadZone.addEventListener('drop', e => {
  handleFiles(e.dataTransfer.files);
});

function handleFileSelect(e) { handleFiles(e.target.files); }

async function handleFiles(files) {
  if (!files.length) return;
  const progressDiv = document.getElementById('upload-progress');
  const progressFill = document.getElementById('progress-fill');
  const progressStatus = document.getElementById('progress-status');
  const progressPct = document.getElementById('progress-pct');
  const uploadedDiv = document.getElementById('uploaded-files');

  progressDiv.classList.add('active');
  let successCount = 0;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const pct = Math.round(((i) / files.length) * 100);
    progressFill.style.width = pct + '%';
    progressPct.textContent = pct + '%';
    progressStatus.textContent = `处理中: ${file.name}`;

    const formData = new FormData();
    formData.append('file', file);

    try {
      const r = await fetch(`${API_BASE}/api/documents/upload`, { method:'POST', body: formData });
      if (r.ok) {
        const data = await r.json();
        successCount++;
        const chip = document.createElement('div');
        chip.className = 'file-chip';
        chip.innerHTML = `✅ <strong>${escapeHtml(file.name)}</strong> → ${data.chunks_count} 个文本块`;
        uploadedDiv.appendChild(chip);
      } else {
        const err = await r.json();
        const chip = document.createElement('div');
        chip.className = 'file-chip';
        chip.innerHTML = `❌ <strong>${escapeHtml(file.name)}</strong> → ${err.detail||'上传失败'}`;
        uploadedDiv.appendChild(chip);
      }
    } catch(e) {
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      chip.innerHTML = `❌ <strong>${escapeHtml(file.name)}</strong> → 网络错误`;
      uploadedDiv.appendChild(chip);
    }
  }

  progressFill.style.width = '100%';
  progressPct.textContent = '100%';
  progressStatus.textContent = `完成：${successCount}/${files.length} 个文件处理成功`;
  toast(`成功上传 ${successCount} 个文件`, 'success');
  setTimeout(() => progressDiv.classList.remove('active'), 2000);
  document.getElementById('file-input').value = '';
}

// ── Document Management ──
async function loadDocs() {
  try {
    const r = await fetch(`${API_BASE}/api/documents`);
    const data = await r.json();
    allDocs = data.documents || [];
    renderDocsTable();
  } catch(e) {
    document.getElementById('docs-tbody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:40px;">无法连接到后端服务</td></tr>';
  }
}

function renderDocsTable() {
  const tbody = document.getElementById('docs-tbody');
  const search = (document.getElementById('docs-search')?.value || '').toLowerCase();
  const filtered = allDocs.filter(d => d.name.toLowerCase().includes(search));

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:40px;">暂无文档，请先上传</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(d => `
    <tr>
      <td><strong>📄 ${escapeHtml(d.name)}</strong></td>
      <td><span class="doc-type-badge">${escapeHtml(d.type||'unknown')}</span></td>
      <td>${d.pages?.length || d.pages || '-'}</td>
      <td>${d.chunks}</td>
      <td>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteDoc('${escapeAttr(d.name)}')">🗑️ 删除</button>
      </td>
    </tr>
  `).join('');
}

function confirmDeleteDoc(name) {
  document.getElementById('confirm-msg').textContent = `确定要删除文档 "${name}" 吗？相关的所有文本块将被移除。`;
  document.getElementById('confirm-modal').classList.add('open');
  document.getElementById('confirm-btn').onclick = async () => {
    try {
      await fetch(`${API_BASE}/api/documents/${encodeURIComponent(name)}`, { method:'DELETE' });
      toast(`已删除: ${name}`, 'success');
    } catch(e) { toast('删除失败', 'error'); }
    closeModal();
    loadDocs();
  };
}

function closeModal() { document.getElementById('confirm-modal').classList.remove('open'); }

async function reindexDocs() {
  try {
    const r = await fetch(`${API_BASE}/api/documents/reindex`, { method:'POST' });
    const data = await r.json();
    toast(`重新索引完成: ${data.chunks_count} 个文本块`, 'success');
    loadDocs();
  } catch(e) { toast('重新索引失败', 'error'); }
}

// ── Health Check ──
async function checkHealth() {
  try {
    const r = await fetch(`${API_BASE}/health`);
    if (r.ok) toast('后端服务运行正常 ✅', 'success');
    else toast('后端服务异常', 'error');
  } catch(e) { toast('无法连接到后端服务，请确认已启动', 'error'); }
}

// ── Utils ──
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function now() { return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }); }

// ── Init ──
loadConversations();
document.getElementById('query-input').addEventListener('input', function() {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});
</script>
